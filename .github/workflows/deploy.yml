name: Deploy to smartstay.ba

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via cPanel API
        run: |
          for file in index.html hero-photo.jpg demo.mp4; do
            if [ -f "$file" ]; then
              echo "Uploading $file..."
              curl -s -X POST "https://cpanel.smartstay.ba/execute/Fileman/upload_files" \
                -H "Authorization: cpanel smartsta:${{ secrets.LEFTOR_API_TOKEN }}" \
                -F "dir=/home/smartsta/public_html" \
                -F "overwrite=1" \
                -F "file-1=@$file"
            fi
          done
          echo "Deploy complete."
